<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box</title>
    <style>
        .container {
            background: lightseagreen;

            display: flex;
            flex-flow: row wrap;
        }

        .item {
            background: lightskyblue;
            border: 1px solid rgb(35, 35, 133);
            text-align: center;
            flex-basis: 150px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item">A</div>
        <div class="item">BBBBBBBBBBB BBBB</div>
        <div class="item">C</div>
        <div class="item">DDDDDD DDDDDDDDDD DDDDDDDDDD</div>
        <div class="item">E</div>
        <div class="item">FFFFFFFF FFFFFFFFFFFFFF FFFFFFFFF FFFFFFF</div>
        <div class="item">G</div>
    </div>
</body>
</html>
