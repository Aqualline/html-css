<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudando iframes</title>
</head>
<body>
    <h1>Testando o uso de um iframe</h1>

    <!-- Por padrão um iframe tem o tamanho de 300x150 px -->

    <p>Acessando o site do <iframe src="https://cursoemvideo.com" frameborder="1" width="400" height="400"> <a href="https://cursoemvideo.com" target="_blank">Curso em Video</a></iframe> para aprender a programar.</p>

    <p>iframes não funcionam com qualquer site, por exemplo... <iframe src="https://www.google.com.br" frameborder="0"></iframe> o Google bloqueia o acesso de iframes</p>
    
    <p>
        Repositôrio do Gustavo Guanabara
        <iframe src="https://gustavoguanabara.github.io" frameborder="0">
            <a href="https://gustavoguanabara.github.io" target="_blank">no GitHub</a>
        </iframe>
    </p>
</body>
</html>
