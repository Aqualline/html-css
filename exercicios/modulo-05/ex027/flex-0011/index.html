<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box</title>
    <style>
        body {
            background-color: rgb(0, 0, 214);
        }

        .container {
            background: white;
            display: flex;
            flex-flow: row nowrap;
            padding: 15px;
            border-radius: 10px;
        }

        .item {
            background: yellow;
            border: 3px solid rgb(36, 36, 143);
            text-align: center;
            flex-basis: 100px;
            border-radius: 5px;
            padding: 15px;
            margin: 2px;
        }

        #cxA {
            flex-grow: 1;
            flex-shrink: 1;
        }
        #cxB {
            flex-grow: 4;
            flex-shrink: 1;
        }
        #cxC {
            flex-grow: 1;
            flex-shrink: 1;
        }
        </style>
</head>
<body>
    <div class="container">
        <div class="item" id="cxA">A</div>
        <div class="item" id="cxB">B</div>
        <div class="item" id="cxC">C</div>
    </div>
</body>
</html>
