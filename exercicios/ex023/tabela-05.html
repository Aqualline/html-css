<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Exercício de Tabela</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            width: 500px;
            border-collapse: collapse;
        }

        caption {
            font-size: 1.5rem;
            font-weight: bolder;
            padding: 8px;
        }

        th, td {
            border: 1px solid black;
            padding: 8px;
        }

        .destaque {
            background-color: lightblue;
        }

        col.nome {
            background-color: rgb(245, 244, 253);
        }
    </style>
</head>
<body>
    <h1>Exercício de Tabela</h1>
    <table>
        <colgroup>
            <col class="nome">
            <col class="sexo">
            <col class="idade">
            <col class="profissão">
        </colgroup>
        <caption>Cadastro</caption>
        <tr>
            <th scope="col">Nome</th>
            <th scope="col">Sexo</th>
            <th scope="col">Idade</th>
            <th scope="col">Profissão</th>
        </tr>
        <tr>
            <td>Ana Luiza</td>
            <td>Feminino</td>
            <td>25</td>
            <td>Jornalista</td>
        </tr>
        <tr>
            <td>João Paulo</td>
            <td>Masculino</td>
            <td>22</td>
            <td>Programador</td>
        </tr>
        <tr>
            <td>Rodrigo Faro</td>
            <td>Masculino</td>
            <td>34</td>
            <td>Apresentador.</td>
        </tr>
        <tr>
            <td>Maraisa Imperator</td>
            <td>Feminino</td>
            <td>28</td>
            <td>Professora</td>
        </tr>
        <tr>
            <td>Junior dos Santos</td>
            <td>Masculino</td>
            <td>24</td>
            <td>Caixa</td>
        </tr>
        <tr>
            <td>Clhoe</td>
            <td>Feminino</td>
            <td>26</td>
            <td>Floricultora</td>
        </tr>
    </table>
</body>
</html>
