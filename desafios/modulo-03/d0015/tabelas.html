<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notas</title>
    <style>
        h1 {
            font-family: 'Times New Roman', Times, serif;
            text-align: center;
            padding: 10px;
            font-size: 2.5rem;
        }

        table {
            font-family: Arial, Helvetica, sans-serif;
            border-collapse: collapse;
            width: 650px;
        }

        td, th {
            border: 1px solid black;
        }

        td {
            padding: 10px;
        }

        .mat {
            font-weight: bold;
            font-size: 1.2rem;
            text-align: center;
        }

        th {
            background: #787879;
            color: aliceblue;
            font-size: 1.1rem;
            padding: 5px;
            min-width: 100px;
        }

    </style>
</head>
<body>

    <table>
        <thead>

                <th rowspan="2" scope="col">Área</th>

                <th rowspan="2" scope="col">Média</th>
            </tr>
            <tr>
                <th>1° Bimestre</th>

            </tr>
        </thead>
        <tbody>

                <td class="mat" rowspan="4">Exatas</td>

                <td>0.0</td>
            </tr>
            <tr>
                <th colspan="4">Média de Exatas</th>
                <th>0.0</th>
            </tr>
            <tr>
                <td class="mat" rowspan="2">Humanas</td>
                <td>Hitória</td>

                <td>0.0S</td>

</html>
